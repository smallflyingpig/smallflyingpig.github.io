<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Jiguo Li</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/blog.css">
  <link rel="shortcut icon" href="../jiguo.ico">
</head>
<body>

<nav class="top-nav">
  <a href="../index.html">Home</a>
  <a href="index.html" class="active">Blog</a>
  <a href="../index_ch.html">中文版</a>
</nav>

<div class="page-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="../img/jiguo.png" alt="Jiguo Li" class="sidebar-photo">
      <h1 class="sidebar-name">Jiguo Li</h1>
      <p class="sidebar-title">Senior Engineer @ MeiTuan</p>
      <div class="profile-links">
        <a href="../paper/jiguo_cv.pdf" class="profile-link">CV</a>
        <a href="https://github.com/smallflyingpig" class="profile-link">Github</a>
        <a href="https://scholar.google.com/citations?user=NfQeyQ4AAAAJ" class="profile-link">Scholar</a>
      </div>
    </div>
    <div class="section-nav-title">Categories</div>
    <ul class="section-nav" id="catFilter">
      <li><a href="#" class="active" data-cat="all">All Posts</a></li>
      <li><a href="#" data-cat="tech">Tech</a></li>
      <li><a href="#" data-cat="essay">Essay</a></li>
      <li><a href="#" data-cat="other">Other</a></li>
    </ul>
    <div class="section-nav-title">Tags</div>
    <div class="tag-cloud" id="tagFilter"></div>
    <div class="section-nav-title">Archive</div>
    <ul class="section-nav" id="yearFilter"></ul>
  </aside>

  <div class="sidebar-toggle" onclick="toggleSidebar()">☰</div>

  <div class="main-content-wrapper">
    <main class="main-content">
      <h2 class="section-title" id="pageTitle">All Posts</h2>
      <div class="blog-grid" id="blogGrid"></div>
      <p class="no-results" id="noResults" style="display:none;text-align:center;color:#888;padding:30px;">No posts yet</p>
    </main>
  </div>
</div>

<script>
let posts=[], cat='all', tag=null, year=null;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

async function load() {
  try {
    const resp = await fetch('index.json');
    posts = await resp.json();
    render();
  } catch(e) {
    document.getElementById('noResults').style.display = 'block';
    console.error('Failed to load posts:', e);
  }
}

function render() {
  const tags = {};
  const years = {};
  
  posts.forEach(p => {
    p.tags.forEach(t => tags[t] = (tags[t] || 0) + 1);
    const y = p.date.split('-')[0];
    years[y] = (years[y] || 0) + 1;
  });
  
  document.getElementById('tagFilter').innerHTML = Object.entries(tags)
    .sort((a,b) => b[1] - a[1])
    .map(([t,c]) => `<span class="filter-tag${tag===t?' active':''}" data-tag="${t}">${t}(${c})</span>`)
    .join('');
  
  document.getElementById('yearFilter').innerHTML = Object.entries(years)
    .sort((a,b) => b[0] - a[0])
    .map(([y,c]) => `<li><a href="#"${year===y?' class="active"':''} data-year="${y}">${y}(${c})</a></li>`)
    .join('');
  
  let filtered = posts;
  if (cat !== 'all') filtered = filtered.filter(p => p.category === cat);
  if (tag) filtered = filtered.filter(p => p.tags.includes(tag));
  if (year) filtered = filtered.filter(p => p.date.startsWith(year));
  
  document.getElementById('blogGrid').innerHTML = filtered.map(p => `
    <div class="blog-card" onclick="location.href='posts/${p.slug}.html'">
      <h3 class="blog-card-title">${p.title}</h3>
      <div class="blog-card-meta">
        <span class="blog-card-date">${p.date}</span>
        <span class="blog-card-cat ${p.category}">${p.category}</span>
      </div>
      <div class="blog-card-tags">${p.tags.map(t => `<span class="tag-item">${t}</span>`).join('')}</div>
      <p class="blog-card-excerpt">${p.excerpt}</p>
    </div>
  `).join('');
  
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
}

document.getElementById('catFilter').addEventListener('click', e => {
  if (e.target.dataset.cat) {
    cat = e.target.dataset.cat;
    document.querySelectorAll('#catFilter a').forEach(a => a.classList.remove('active'));
    e.target.classList.add('active');
    render();
  }
});

document.getElementById('tagFilter').addEventListener('click', e => {
  if (e.target.dataset.tag) {
    tag = tag === e.target.dataset.tag ? null : e.target.dataset.tag;
    render();
  }
});

document.getElementById('yearFilter').addEventListener('click', e => {
  if (e.target.dataset.year) {
    year = year === e.target.dataset.year ? null : e.target.dataset.year;
    render();
  }
});

load();
</script>

</body>
</html>
